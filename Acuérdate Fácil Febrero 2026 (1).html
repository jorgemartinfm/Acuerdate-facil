      const colors = {
        orange: "bg-orange-500 text-white",
        green: "bg-green-600 text-white",
        blue: "bg-blue-600 text-white",
        red: "bg-red-600 text-white",
        purple: "bg-purple-600 text-white",
        yellow: "bg-yellow-400 text-gray-900",
        gray: "bg-gray-500 text-white",
      };

        <span className={`inline-block px-2 py-0.5 rounded-full text-xs font-bold ${colors[color] || colors.orange} mr-1 mb-1`}>
          {children}
        </span>
      );
    }

    function Card({ title, children, highlight, defaultOpen = false }) {
      const [open, setOpen] = useState(defaultOpen);
      return (
        <div className={`rounded-xl border-2 ${highlight ? "border-orange-300 shadow-lg shadow-orange-50" : "border-gray-200"} bg-white mb-3 overflow-hidden transition-shadow hover:shadow-md`}>

    /* ==================== APP ==================== */

    function App() {
      const [activeSection, setActiveSection] = useState("prioridades");
      const navRef = useRef(null);

      const renderSection = () => {

        return <Comp />;
      };

      return (

          <div className="bg-gradient-to-r from-gray-900 to-gray-800 text-white px-4 py-4 no-print">

                  <button
                    key={s.id}
                    onClick={() => { setActiveSection(s.id); window.scrollTo({ top: 0, behavior: 'smooth' }); }}
                    className={`px-3.5 py-2 rounded-xl text-xs font-semibold whitespace-nowrap transition-all duration-200 cursor-pointer ${
                      activeSection === s.id
                        ? "bg-orange-500 text-white shadow-md shadow-orange-200"
                        : "bg-gray-100 text-gray-500 hover:bg-gray-200 hover:text-gray-700"

                  >
                    <span className="mr-1">{s.icon}</span>{s.label}

          {/* Content */}
          <div className="max-w-4xl mx-auto px-4 py-5">

          {/* Footer */}

    ReactDOM.render(<App />, document.getElementById("root"));

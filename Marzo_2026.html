<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orange · Oferta Táctica Marzo 2026 · SoHo</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23f97316'/><text x='50' y='72' font-size='60' font-weight='bold' text-anchor='middle' fill='white'>O</text></svg>">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&display=swap');
    * { font-family: 'DM Sans', sans-serif; }
    ::-webkit-scrollbar { height: 4px; width: 6px; }
    ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
    ::-webkit-scrollbar-thumb { background: #f97316; border-radius: 10px; }
    .nav-scroll::-webkit-scrollbar { height: 3px; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeIn 0.25s ease-out; }
    @keyframes slideDown { from { opacity: 0; max-height: 0; } to { opacity: 1; max-height: 2000px; } }
    .slide-down { animation: slideDown 0.3s ease-out; }
    @media print { .no-print { display: none !important; } }
    
    /* Estilos del buscador */
    .search-highlight {
      background-color: #fb923c;
      color: white;
      padding: 2px 4px;
      border-radius: 3px;
      font-weight: 600;
    }
    .search-highlight.active {
      background-color: #ea580c;
      box-shadow: 0 0 0 2px #fff, 0 0 0 4px #ea580c;
    }
  </style>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { orange: { 50:'#fff7ed',100:'#ffedd5',200:'#fed7aa',300:'#fdba74',400:'#fb923c',500:'#f97316',600:'#ea580c',700:'#c2410c',800:'#9a3412',900:'#7c2d12' } }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-100">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const sections = [
      { id: "prioridades", label: "Prioridades", icon: "🎯" },
      { id: "novedades", label: "Novedades", icon: "🌟" },
      { id: "tv", label: "TV y Deporte", icon: "📺" },
      { id: "dispositivos", label: "Dispositivos", icon: "📱" },
      { id: "promos", label: "Promociones", icon: "💰" },
      { id: "lineas", label: "Líneas", icon: "📞" },
      { id: "retencion", label: "Retención", icon: "🛡️" },
      { id: "servicios", label: "Servicios", icon: "⚙️" },
      { id: "resumen", label: "Tarifas", icon: "📋" },
    ];

    function Badge({ children, color = "orange" }) {
      const colors = {
        orange: "bg-orange-500 text-white",
        green: "bg-green-600 text-white",
        blue: "bg-blue-600 text-white",
        red: "bg-red-600 text-white",
        purple: "bg-purple-600 text-white",
        yellow: "bg-yellow-400 text-gray-900",
        gray: "bg-gray-500 text-white",
      };
      return (
        <span className={`inline-block px-2 py-0.5 rounded-full text-xs font-bold ${colors[color] || colors.orange} mr-1 mb-1`}>
          {children}
        </span>
      );
    }

    function Card({ title, children, highlight, defaultOpen = false }) {
      const [open, setOpen] = useState(defaultOpen);
      return (
        <div className={`rounded-xl border-2 ${highlight ? "border-orange-300 shadow-lg shadow-orange-50" : "border-gray-200"} bg-white mb-3 overflow-hidden transition-shadow hover:shadow-md`}>
          <button
            onClick={() => setOpen(!open)}
            className="w-full flex items-center justify-between px-5 py-3.5 text-left hover:bg-gray-50 transition-colors cursor-pointer"
          >
            <span className="font-bold text-gray-800 text-sm">{title}</span>
            <span className={`transform transition-transform duration-200 text-orange-400 text-xs ${open ? "rotate-180" : ""}`}>▼</span>
          </button>
          {open && <div className="px-5 pb-5 text-sm text-gray-700 border-t border-gray-100 slide-down">{children}</div>}
        </div>
      );
    }

    function InfoRow({ label, value, badge }) {
      return (
        <div className="flex items-start py-2 border-b border-gray-50 last:border-0">
          <span className="text-gray-400 text-xs w-36 flex-shrink-0 pt-0.5 uppercase tracking-wide font-semibold">{label}</span>
          <span className="text-gray-800 text-sm font-medium flex-1">
            {value} {badge && <Badge color={badge.color}>{badge.text}</Badge>}
          </span>
        </div>
      );
    }

    function PriceTag({ price, period, promo }) {
      return (
        <div className="inline-flex flex-col items-center bg-gradient-to-b from-orange-50 to-orange-100 rounded-xl px-4 py-3 mr-2 mb-2 border border-orange-200">
          <span className="text-3xl font-black text-orange-600 leading-none">{price}<span className="text-base">€</span></span>
          <span className="text-xs text-gray-500 mt-0.5">{period}</span>
          {promo && <span className="text-xs text-green-600 font-bold mt-0.5">{promo}</span>}
        </div>
      );
    }

    /* ==================== BUSCADOR ==================== */
    function SearchBar({ searchTerm, setSearchTerm, searchResults, currentResultIndex, setCurrentResultIndex }) {
      const inputRef = useRef(null);

      const handleNext = () => {
        if (searchResults.length > 0) {
          const newIndex = (currentResultIndex + 1) % searchResults.length;
          setCurrentResultIndex(newIndex);
          scrollToResult(newIndex);
        }
      };

      const handlePrev = () => {
        if (searchResults.length > 0) {
          const newIndex = currentResultIndex === 0 ? searchResults.length - 1 : currentResultIndex - 1;
          setCurrentResultIndex(newIndex);
          scrollToResult(newIndex);
        }
      };

      const scrollToResult = (index) => {
        const highlights = document.querySelectorAll('.search-highlight');
        if (highlights[index]) {
          highlights[index].scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
      };

      const handleClear = () => {
        setSearchTerm('');
        setCurrentResultIndex(0);
        inputRef.current?.focus();
      };

      return (
        <div className="bg-white border-b shadow-md sticky top-0 z-20 no-print">
          <div className="max-w-4xl mx-auto px-4 py-3">
            <div className="flex items-center gap-2">
              <div className="flex-1 relative">
                <span className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">🔍</span>
                <input
                  ref={inputRef}
                  type="text"
                  value={searchTerm}
                  onChange={(e) => setSearchTerm(e.target.value)}
                  placeholder="Buscar en la oferta... (Ctrl + K)"
                  className="w-full pl-10 pr-10 py-2.5 border-2 border-gray-200 rounded-xl focus:border-orange-400 focus:outline-none text-sm"
                />
                {searchTerm && (
                  <button
                    onClick={handleClear}
                    className="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600"
                  >
                    ✕
                  </button>
                )}
              </div>
              
              {searchResults.length > 0 && (
                <>
                  <div className="text-xs text-gray-500 whitespace-nowrap">
                    {currentResultIndex + 1} de {searchResults.length}
                  </div>
                  <div className="flex gap-1">
                    <button
                      onClick={handlePrev}
                      className="px-3 py-2 bg-gray-100 hover:bg-gray-200 rounded-lg text-sm font-semibold transition-colors"
                      title="Anterior (Shift + Enter)"
                    >
                      ◀
                    </button>
                    <button
                      onClick={handleNext}
                      className="px-3 py-2 bg-gray-100 hover:bg-gray-200 rounded-lg text-sm font-semibold transition-colors"
                      title="Siguiente (Enter)"
                    >
                      ▶
                    </button>
                  </div>
                </>
              )}
            </div>
            
            {searchTerm && searchResults.length === 0 && (
              <div className="mt-2 text-xs text-gray-500 text-center">
                No se encontraron resultados para "{searchTerm}"
              </div>
            )}
          </div>
        </div>
      );
    }

    /* ==================== SECTIONS ==================== */

    function Prioridades() {
      return (
        <div className="space-y-4 fade-in">
          <div className="bg-gradient-to-br from-gray-900 via-gray-800 to-gray-900 rounded-2xl p-6 text-white relative overflow-hidden">
            <div className="absolute top-0 right-0 w-40 h-40 bg-orange-500 rounded-full opacity-10 -translate-y-10 translate-x-10"></div>
            <div className="absolute bottom-0 left-0 w-24 h-24 bg-orange-400 rounded-full opacity-10 translate-y-8 -translate-x-8"></div>
            <div className="relative">
              <div className="flex items-center gap-2 mb-1">
                <div className="w-8 h-8 bg-orange-500 rounded-lg flex items-center justify-center font-black text-sm">O</div>
                <span className="text-orange-400 font-bold text-xs uppercase tracking-widest">Oferta Táctica</span>
              </div>
              <h2 className="text-2xl font-black mb-1">Marzo 2026 — SoHo</h2>
              <p className="text-gray-400 text-sm">Del 2 de marzo al 6 de abril · Autónomos y Pequeñas Empresas</p>
            </div>
          </div>

          <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
            {[
              { n: "1", title: "Proteger la Cartera", color: "orange", items: ["Cliente fidelizado = beneficio incluido", "Mejores ofertas Top, Premium, Flagship", "Renove a 48 meses", "1 nueva referencia portátiles"] },
              { n: "2", title: "Foco en Clientes de Valor", color: "blue", items: ["Mayores ingresos sin erosionar ARPU", "Promociones LLAA y Multisede", "Soluciones digitales y nuevas OTTs"] },
